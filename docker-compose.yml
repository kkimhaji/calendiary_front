services:
  frontend:
    build:
      context: .
    container_name: calendiary-front
    image: calendiary-front:v1
    # args:
    #   REACT_APP_API_BASE_URL: http://localhost:8080
    env_file:
      - .env
    ports:
      - "3000:80"
    networks:
      - calendiary_network
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:8080

networks:
  calendiary_network:
    name: calendiary_network
    external: true  # 외부에서 이미 생성된 네트워크 사용